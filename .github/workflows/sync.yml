name: Sync

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Sync to Gitee
      uses: wearerequired/git-mirror-action@master
      env:
          # 注意在 Settings->Secrets 配置 GIT_RSA_PRIVATE_KEY
          SSH_PRIVATE_KEY: ${{ secrets.GIT_RSA_PRIVATE_KEY }}
      with:
          # 注意替换为你的 GitHub 源仓库地址
          source-repo: "git@github.com:nojsja/blogs.git"
          # 注意替换为你的 Gitee 目标仓库地址
          destination-repo: "git@github.com:nojsja/nojsja.github.io.git"